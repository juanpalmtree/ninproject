<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nindou Village Hall</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      color: #fff;
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
    }

    .village-hall-screen {
      position: relative;
      width: 800px;
      height: 600px;
      overflow: hidden;
      background: #05080a;
    }

    .vector-layer {
      position: absolute;
      display: block;
      pointer-events: none;
      user-select: none;
    }

    .room-list-panel {
      position: absolute;
      left: 545px;
      top: 50px;
      width: 235px;
      height: 450px;
      z-index: 4;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      padding: 4px 6px 4px 4px;
      scrollbar-color: rgba(255, 232, 118, .75) rgba(0, 0, 0, .2);
    }

    .room-card {
      flex: 0 0 auto;
      min-height: 54px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, .15);
      border-radius: 4px;
      background: rgba(255, 255, 255, .08);
      color: #fff;
      cursor: pointer;
      text-align: left;
      font: inherit;
      transition: background .2s;
    }

    .room-card:hover,
    .room-card:focus-visible {
      background: rgba(255, 255, 255, .18);
      outline: 2px solid #fff16f;
      outline-offset: 1px;
    }

    .room-card strong,
    .room-card span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .room-card strong {
      color: #ffd700;
      font-size: 13px;
      line-height: 1.1;
    }

    .room-card span {
      color: rgba(255, 255, 255, .7);
      font-size: 11px;
      font-weight: 400;
    }

    .room-card em {
      flex: 0 0 auto;
      padding: 4px 8px;
      border-radius: 12px;
      background: rgba(0, 0, 0, .4);
      color: #fff;
      font-size: 12px;
      font-style: normal;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="village-hall-screen" aria-label="Village Hall">
    <img
      class="vector-layer"
      src="assets/runtime/ui_vectors/lobbies/shapes/1.2.svg"
      alt=""
      style="top: -75px; left: 28.5px; width: 818.5px; height: 624px; z-index: 0;"
    >
    <img
      class="vector-layer"
      src="assets/runtime/ui_vectors/lobbies/shapes/683.svg"
      alt=""
      style="top: -3px; left: -3px; width: 802px; height: 603px; z-index: 1;"
    >
    <img
      class="vector-layer"
      src="assets/runtime/ui_vectors/lobbies/shapes/1.3.svg"
      alt=""
      style="top: 12px; left: 535.5px; width: 253px; height: 528px; z-index: 3;"
    >

    <section id="roomListPanel" class="room-list-panel" aria-label="Available rooms"></section>
  </main>

  <script>
    const roomListPanel = document.querySelector("#roomListPanel");

    function nativeLobbyBridge() {
      if (window.NindouGame?.enterNativePlayerLobby) return window.NindouGame;
      if (window.parent && window.parent !== window && window.parent.NindouGame?.enterNativePlayerLobby) return window.parent.NindouGame;
      if (window.opener && !window.opener.closed && window.opener.NindouGame?.enterNativePlayerLobby) return window.opener.NindouGame;
      return null;
    }

    function joinRoom(roomId) {
      console.log("Joining room:", roomId);
      const bridge = nativeLobbyBridge();
      if (bridge) {
        bridge.enterNativePlayerLobby(roomId);
        return;
      }

      window.sessionStorage.setItem("nindou.pendingRoomJoin", roomId);
      window.location.href = `game.en.html?room=${encodeURIComponent(roomId)}`;
    }

    function renderVillageRooms(rooms = []) {
      roomListPanel.innerHTML = "";
      rooms.forEach((room) => {
        const card = document.createElement("div");
        card.className = "room-card";
        card.dataset.roomId = room.id;
        card.tabIndex = 0;
        card.innerHTML = `
          <div>
            <strong>No.${room.number} ${room.title}</strong>
            <span>Mode: ${room.mode}</span>
          </div>
          <em>${room.currentPlayers}/${room.maxPlayers}</em>
        `;
        card.addEventListener("click", () => joinRoom(room.id));
        card.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            joinRoom(room.id);
          }
        });
        roomListPanel.appendChild(card);
      });
    }

    window.joinRoom = joinRoom;
    window.renderVillageRooms = renderVillageRooms;
    window.renderVillageRooms([
      { id: "rm-101", number: "001", title: "IGA Training Pit", mode: "Brawl", currentPlayers: 3, maxPlayers: 6 },
      { id: "rm-102", number: "002", title: "1v1 Deathmatch", mode: "Sudden Death", currentPlayers: 1, maxPlayers: 2 },
      { id: "rm-103", number: "003", title: "Casual Slashing", mode: "Brawl", currentPlayers: 5, maxPlayers: 6 },
      { id: "rm-104", number: "004", title: "Boss Raid Test", mode: "Mission", currentPlayers: 2, maxPlayers: 4 },
    ]);
  </script>
</body>
</html>
