<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pre-Game Lobby Screen Aligner</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: #eef8f8;
      background: #11181c;
      font: 14px/1.35 Arial, sans-serif;
    }
    button, select, input, textarea { font: inherit; }
    button {
      padding: 7px 10px;
      border: 1px solid #66777d;
      border-radius: 4px;
      color: #eef8f8;
      background: #26353b;
      cursor: pointer;
    }
    button:hover { background: #344950; }
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid #3b5159;
      background: #172328;
    }
    .toolbar label { display: flex; align-items: center; gap: 6px; }
    .toolbar select { min-width: 210px; }
    .main {
      display: grid;
      grid-template-columns: max-content minmax(340px, 1fr);
      gap: 16px;
      padding: 16px;
      align-items: start;
    }
    .zoom-shell {
      width: 800px;
      height: 600px;
      transform-origin: top left;
    }
    #workspace {
      --grid-size: 10px;
      position: relative;
      width: 800px;
      height: 600px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 0 0 2px #72929c;
      user-select: none;
    }
    .room-bg {
      position: absolute;
      inset: 0;
      width: 800px;
      height: 600px;
      pointer-events: none;
    }
    .grid-overlay,
    .center-overlay {
      position: absolute;
      inset: 0;
      z-index: 80;
      pointer-events: none;
    }
    .grid-overlay {
      background-image:
        linear-gradient(rgba(255,255,255,.14) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.14) 1px, transparent 1px);
      background-size: var(--grid-size) var(--grid-size);
    }
    .center-overlay {
      background:
        linear-gradient(90deg, transparent 399px, rgba(255,224,75,.72) 399px, rgba(255,224,75,.72) 401px, transparent 401px),
        linear-gradient(transparent 299px, rgba(255,224,75,.72) 299px, rgba(255,224,75,.72) 301px, transparent 301px);
    }
    .layer {
      position: absolute;
      z-index: 10;
      border: 1px dashed rgba(255, 224, 75, .82);
      cursor: move;
    }
    .layer.selected {
      border-color: #00e5ff;
      box-shadow: 0 0 0 2px rgba(0, 229, 255, .38);
    }
    .layer-label {
      position: absolute;
      left: 0;
      top: -17px;
      z-index: 90;
      padding: 1px 4px;
      color: #fff;
      background: rgba(0,0,0,.8);
      font-size: 10px;
      white-space: nowrap;
      pointer-events: none;
    }
    .resize-handle {
      position: absolute;
      right: -5px;
      bottom: -5px;
      z-index: 95;
      width: 11px;
      height: 11px;
      border: 1px solid #001419;
      background: #00e5ff;
      cursor: nwse-resize;
    }
    .card-preview {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .card-preview .bounds,
    .card-preview .frame,
    .card-preview .avatar,
    .card-preview .weapon,
    .card-preview .team-color,
    .card-preview .name-bar,
    .card-preview .info-bg,
    .card-preview .info-icon {
      position: absolute;
      display: block;
      pointer-events: none;
    }
    .card-preview .bounds { left: 2.2%; top: .4%; width: 98.1%; height: 100%; }
    .card-preview .frame { left: 3.8%; top: 10.4%; width: 93.6%; height: 75.8%; }
    .card-preview .avatar { left: 23.4%; top: 22.8%; width: 55.7%; height: 48.5%; object-fit: contain; }
    .card-preview .weapon { left: -5%; top: 47.8%; width: 49%; height: 40.7%; object-fit: contain; }
    .card-preview .team-color { left: 2.5%; top: 2.3%; width: 19.4%; height: 9%; }
    .card-preview .name-bar { left: 1.9%; top: 90.3%; width: 97.2%; height: 10.3%; }
    .card-preview .hp {
      position: absolute;
      left: 27%;
      top: 69%;
      width: 44%;
      height: 9%;
      display: grid;
      place-items: center;
      color: #08100e;
      background: #f2edc4;
      border: 1px solid #14222a;
      font-size: 10px;
      font-weight: 900;
    }
    .card-preview .rank {
      position: absolute;
      left: 25%;
      top: 81%;
      color: #07100d;
      font-size: 9px;
      font-weight: 900;
      white-space: nowrap;
    }
    .card-preview .name {
      position: absolute;
      left: 7%;
      top: 91%;
      width: 86%;
      color: #fff;
      font-size: 10px;
      font-weight: 900;
      text-align: center;
      white-space: nowrap;
    }
    .card-preview .info-bg { left: 77.5%; top: 81.8%; width: 19.4%; height: 8.2%; }
    .card-preview .info-icon { left: 85.2%; top: 83.3%; width: 3.7%; height: 5%; }
    .image-layer img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      pointer-events: none;
    }
    .text-layer {
      display: grid;
      place-items: center;
      color: #fff7df;
      font-weight: 900;
      line-height: 1.04;
      text-align: center;
      text-shadow: 1px 1px 0 rgba(0,0,0,.75);
      white-space: pre-line;
    }
    .mode-layer {
      display: grid;
      place-items: center;
      border: 3px solid #b4823f;
      color: #ffbf25;
      background: #003656;
      font-size: 64px;
      font-weight: 900;
    }
    .guide-layer {
      border-style: dotted;
      border-color: rgba(255, 110, 110, .92);
      background: rgba(255, 80, 80, .08);
    }
    .panel {
      padding: 12px;
      border: 1px solid #3b5159;
      background: #172328;
    }
    .panel h2 { margin: 0 0 10px; font-size: 16px; }
    .panel-grid {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 7px;
      margin-bottom: 12px;
    }
    .panel-grid input { min-width: 0; width: 100%; }
    textarea {
      width: 100%;
      min-height: 360px;
      resize: vertical;
      padding: 10px;
      border: 1px solid #48636c;
      color: #dafafa;
      background: #0c1519;
      font: 12px/1.35 Consolas, monospace;
    }
    .help { color: #abc1c8; font-size: 12px; }
  </style>
</head>
<body>
  <header class="toolbar">
    <strong>Pre-Game Lobby Screen Aligner</strong>
    <label>Layer <select id="layerSelect"></select></label>
    <label><input id="showGrid" type="checkbox" checked> Grid</label>
    <label>Grid <input id="gridSize" type="range" min="5" max="50" value="10"> <span id="gridSizeValue">10px</span></label>
    <label>Zoom <input id="zoomRange" type="range" min="50" max="150" value="100"> <span id="zoomValue">100%</span></label>
    <button id="copyJson" type="button">Copy JSON</button>
    <button id="loadJson" type="button">Load JSON</button>
    <button id="resetLayout" type="button">Reset</button>
  </header>

  <main class="main">
    <div>
      <div id="zoomShell" class="zoom-shell">
        <div id="workspace">
          <img class="room-bg" src="dev_assets/common_room_1.4_no_text.svg" alt="">
          <div id="gridOverlay" class="grid-overlay"></div>
          <div id="centerOverlay" class="center-overlay"></div>
        </div>
      </div>
    </div>

    <aside class="panel">
      <h2>Selected Layer</h2>
      <div class="panel-grid">
        <label for="selectedId">ID</label><input id="selectedId" readonly>
        <label for="selectedLeft">Left</label><input id="selectedLeft" type="number" step=".01">
        <label for="selectedTop">Top</label><input id="selectedTop" type="number" step=".01">
        <label for="selectedWidth">Width</label><input id="selectedWidth" type="number" step=".01">
        <label for="selectedHeight">Height</label><input id="selectedHeight" type="number" step=".01">
        <label for="selectedZ">Z-index</label><input id="selectedZ" type="number" step="1">
      </div>
      <p class="help">Drag any layer freely. Drag its cyan bottom-right handle to resize. Arrow keys nudge by 1px; Shift + Arrow nudges by 10px. Cards resize as composed blocks.</p>
      <textarea id="outputMatrix" spellcheck="false"></textarea>
    </aside>
  </main>

  <script>
    const initialLayers = [
      { id: "p1", label: "P1 player card", type: "card", team: "blue", top: 58, left: 58, width: 130, height: 210, zIndex: 20 },
      { id: "p2", label: "P2 player card", type: "card", team: "blue", top: 58, left: 191, width: 130, height: 210, zIndex: 20 },
      { id: "p3", label: "P3 player card", type: "card", team: "blue", top: 58, left: 324, width: 130, height: 210, zIndex: 20 },
      { id: "p4", label: "P4 player card", type: "card", team: "blue", top: 58, left: 457, width: 130, height: 210, zIndex: 20 },
      { id: "p5", label: "P5 player card", type: "card", team: "gray", top: 278, left: 58, width: 130, height: 210, zIndex: 20 },
      { id: "p6", label: "P6 player card", type: "card", team: "gray", top: 278, left: 191, width: 130, height: 210, zIndex: 20 },
      { id: "p7", label: "P7 player card", type: "card", team: "gray", top: 278, left: 324, width: 130, height: 210, zIndex: 20 },
      { id: "p8", label: "P8 player card", type: "card", team: "gray", top: 278, left: 457, width: 130, height: 210, zIndex: 20 },
      { id: "blueLabel", label: "BLUE transparent text", type: "text", text: "B\\nL\\nU\\nE", top: 65.5, left: 16.75, width: 29.5, height: 91, zIndex: 50 },
      { id: "grayLabel", label: "GRAY transparent text", type: "text", text: "G\\nR\\nA\\nY", top: 158.75, left: 15.5, width: 29.5, height: 92.25, zIndex: 50 },
      { id: "exitButton", label: "Exit artwork - move this", type: "image", asset: "dev_assets/exit_button_tight.svg", top: 552, left: 200.75, width: 97.75, height: 32.75, zIndex: 50 },
      { id: "readyButton", label: "Ready artwork - move this", type: "image", asset: "dev_assets/yellow_ready_button_tight.svg", top: 552, left: 340, width: 94, height: 34, zIndex: 50 },
      { id: "exitHitbox", label: "Exit click region", type: "guide", top: 552, left: 200.75, width: 97.75, height: 32.75, zIndex: 49 },
      { id: "readyHitbox", label: "Ready click region", type: "guide", top: 552, left: 340, width: 94, height: 34, zIndex: 49 },
      { id: "modeButton", label: "? mode button", type: "mode", text: "?", top: 78, left: 595, width: 190, height: 150, zIndex: 40 }
    ];

    const workspace = document.querySelector("#workspace");
    const layerSelect = document.querySelector("#layerSelect");
    const outputMatrix = document.querySelector("#outputMatrix");
    const selectedId = document.querySelector("#selectedId");
    const selectedLeft = document.querySelector("#selectedLeft");
    const selectedTop = document.querySelector("#selectedTop");
    const selectedWidth = document.querySelector("#selectedWidth");
    const selectedHeight = document.querySelector("#selectedHeight");
    const selectedZ = document.querySelector("#selectedZ");
    const zoomRange = document.querySelector("#zoomRange");
    const zoomValue = document.querySelector("#zoomValue");
    const zoomShell = document.querySelector("#zoomShell");
    const showGrid = document.querySelector("#showGrid");
    const gridOverlay = document.querySelector("#gridOverlay");
    const centerOverlay = document.querySelector("#centerOverlay");
    const gridSize = document.querySelector("#gridSize");
    const gridSizeValue = document.querySelector("#gridSizeValue");
    let selected = null;
    let drag = null;
    let layers = [];

    function round(value) { return Math.round(value * 100) / 100; }
    function px(value) { return `${round(value)}px`; }
    function numeric(value) { return Number.parseFloat(value) || 0; }
    function zoom() { return Number(zoomRange.value) / 100; }

    function cardMarkup(layer) {
      const gray = layer.team === "gray";
      const teamColor = gray ? "1136.svg" : "1135.svg";
      const ninja = gray ? "ninja-grey" : "ninja-blue";
      return `
        <div class="card-preview">
          <img class="bounds" src="assets/runtime/ui_vectors/lobbies/shapes/shapes/1104.svg" alt="">
          <img class="frame" src="assets/runtime/ui_vectors/lobbies/shapes/sprites/DefineSprite_1107/1.svg" alt="">
          <img class="team-color" src="assets/runtime/ui_vectors/lobbies/shapes/shapes/${teamColor}" alt="">
          <img class="avatar" src="assets/${ninja}/idleDown.png" alt="">
          <img class="weapon" src="assets/weapon/blade.png" alt="">
          <span class="hp">300</span>
          <span class="rank">Shoshinsha</span>
          <img class="info-bg" src="assets/runtime/ui_vectors/lobbies/shapes/shapes/1131.svg" alt="">
          <img class="info-icon" src="assets/runtime/ui_vectors/lobbies/shapes/shapes/1132.svg" alt="">
          <img class="name-bar" src="assets/runtime/ui_vectors/lobbies/shapes/shapes/671.svg" alt="">
          <span class="name">${layer.id}</span>
        </div>`;
    }

    function renderLayer(layer) {
      const el = document.createElement("div");
      el.className = `layer ${layer.type}-layer`;
      el.dataset.layerId = layer.id;
      Object.assign(el.style, {
        left: px(layer.left),
        top: px(layer.top),
        width: px(layer.width),
        height: px(layer.height),
        zIndex: String(layer.zIndex)
      });
      if (layer.type === "card") el.innerHTML = cardMarkup(layer);
      if (layer.type === "image") el.innerHTML = `<img src="${layer.asset}" alt="">`;
      if (layer.type === "text" || layer.type === "mode") el.textContent = layer.text;
      const label = document.createElement("span");
      label.className = "layer-label";
      label.textContent = layer.label;
      const handle = document.createElement("i");
      handle.className = "resize-handle";
      handle.dataset.resize = "true";
      el.append(label, handle);
      workspace.appendChild(el);
      return el;
    }

    function renderAll() {
      workspace.querySelectorAll(".layer").forEach((el) => el.remove());
      layerSelect.innerHTML = "";
      layers.forEach((layer) => {
        renderLayer(layer);
        const option = document.createElement("option");
        option.value = layer.id;
        option.textContent = layer.label;
        layerSelect.appendChild(option);
      });
      selectLayer(workspace.querySelector(".layer"));
      updateOutput();
    }

    function currentLayer() {
      return layers.find((layer) => layer.id === selected?.dataset.layerId);
    }

    function selectLayer(el) {
      if (!el) return;
      selected?.classList.remove("selected");
      selected = el;
      selected.classList.add("selected");
      layerSelect.value = selected.dataset.layerId;
      syncFields();
    }

    function syncFields() {
      const layer = currentLayer();
      if (!layer) return;
      selectedId.value = layer.id;
      selectedLeft.value = layer.left;
      selectedTop.value = layer.top;
      selectedWidth.value = layer.width;
      selectedHeight.value = layer.height;
      selectedZ.value = layer.zIndex;
    }

    function applyBox(layer, el, box) {
      layer.left = round(box.left);
      layer.top = round(box.top);
      layer.width = Math.max(8, round(box.width));
      layer.height = Math.max(8, round(box.height));
      layer.zIndex = Math.round(box.zIndex ?? layer.zIndex);
      Object.assign(el.style, {
        left: px(layer.left),
        top: px(layer.top),
        width: px(layer.width),
        height: px(layer.height),
        zIndex: String(layer.zIndex)
      });
      syncFields();
      updateOutput();
    }

    function updateOutput() {
      outputMatrix.value = JSON.stringify({
        workspace: { width: 800, height: 600, backgroundAsset: "dev_assets/common_room_1.4_no_text.svg" },
        layers
      }, null, 2);
    }

    function startDrag(event) {
      const el = event.target.closest(".layer");
      if (!el) return;
      selectLayer(el);
      const layer = currentLayer();
      drag = {
        el,
        layer,
        resize: event.target.dataset.resize === "true",
        startX: event.clientX,
        startY: event.clientY,
        left: layer.left,
        top: layer.top,
        width: layer.width,
        height: layer.height
      };
      el.setPointerCapture?.(event.pointerId);
      event.preventDefault();
    }

    function moveDrag(event) {
      if (!drag) return;
      const dx = (event.clientX - drag.startX) / zoom();
      const dy = (event.clientY - drag.startY) / zoom();
      applyBox(drag.layer, drag.el, drag.resize
        ? { left: drag.left, top: drag.top, width: drag.width + dx, height: drag.height + dy }
        : { left: drag.left + dx, top: drag.top + dy, width: drag.width, height: drag.height });
    }

    function nudge(event) {
      if (!selected || !["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown"].includes(event.key)) return;
      event.preventDefault();
      const amount = event.shiftKey ? 10 : 1;
      const layer = currentLayer();
      const delta = {
        ArrowLeft: [-amount, 0],
        ArrowRight: [amount, 0],
        ArrowUp: [0, -amount],
        ArrowDown: [0, amount]
      }[event.key];
      applyBox(layer, selected, { ...layer, left: layer.left + delta[0], top: layer.top + delta[1] });
    }

    [selectedLeft, selectedTop, selectedWidth, selectedHeight, selectedZ].forEach((input) => {
      input.addEventListener("input", () => {
        const layer = currentLayer();
        if (!layer) return;
        applyBox(layer, selected, {
          left: numeric(selectedLeft.value),
          top: numeric(selectedTop.value),
          width: numeric(selectedWidth.value),
          height: numeric(selectedHeight.value),
          zIndex: numeric(selectedZ.value)
        });
      });
    });

    workspace.addEventListener("pointerdown", startDrag);
    document.addEventListener("pointermove", moveDrag);
    document.addEventListener("pointerup", () => { drag = null; });
    document.addEventListener("keydown", nudge);
    layerSelect.addEventListener("change", () => selectLayer(workspace.querySelector(`[data-layer-id="${CSS.escape(layerSelect.value)}"]`)));
    zoomRange.addEventListener("input", () => {
      const value = zoom();
      zoomShell.style.transform = `scale(${value})`;
      zoomValue.textContent = `${zoomRange.value}%`;
    });
    showGrid.addEventListener("change", () => {
      gridOverlay.hidden = !showGrid.checked;
      centerOverlay.hidden = !showGrid.checked;
    });
    gridSize.addEventListener("input", () => {
      workspace.style.setProperty("--grid-size", `${gridSize.value}px`);
      gridSizeValue.textContent = `${gridSize.value}px`;
    });
    document.querySelector("#copyJson").addEventListener("click", async () => {
      outputMatrix.select();
      try { await navigator.clipboard.writeText(outputMatrix.value); }
      catch { document.execCommand("copy"); }
    });
    document.querySelector("#loadJson").addEventListener("click", () => {
      try {
        const parsed = JSON.parse(outputMatrix.value);
        if (!Array.isArray(parsed.layers)) throw new Error("JSON must contain a layers array.");
        layers = parsed.layers;
        renderAll();
      } catch (error) {
        alert(`Could not load JSON: ${error.message}`);
      }
    });
    document.querySelector("#resetLayout").addEventListener("click", () => {
      layers = structuredClone(initialLayers);
      renderAll();
    });

    layers = structuredClone(initialLayers);
    renderAll();
    zoomRange.dispatchEvent(new Event("input"));
    gridSize.dispatchEvent(new Event("input"));
  </script>
</body>
</html>
